<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Resume</title>
    <link rel="stylesheet" href="/en_resume/styles.css">
</head>
<body>
    <div class="resume-container">
        <!-- Left Column -->
        <div class="left-column">
            <section class="avatar-section">
                <div class="avatar-container">
                    <img id="profile-avatar" src="/en_resume/assets/avatar.jpg" alt="Professional Avatar">
                </div>
            </section>
            <section class="personal-info">
                <h2>Personal Info</h2>
                <div class="info-content" id="personal-info">
                    <!-- Dynamically filled -->
                </div>
            </section>

            <section class="technical-skills">
                <h2>Technical Skills</h2>
                <div class="skills-content" id="technical-skills">
                    <!-- Dynamically filled -->
                </div>
            </section>

            <section class="visa-info">
                <h2>Work Authorization</h2>
                <div class="info-content" id="visa-info">
                    <!-- Dynamically filled -->
                </div>
            </section>

            <section class="languages">
                <h2>Languages</h2>
                <div class="language-content" id="languages">
                    <!-- Dynamically filled -->
                </div>
            </section>

            <section class="highlights">
                <h2>Key Highlights</h2>
                <div id="highlights">
                    <!-- Dynamically filled -->
                </div>
            </section>

            <section class="personal-statement">
                <h2>Personal Statement and My Dog</h2>
                <div id="personal-statement">
                    <!-- Dynamically filled -->
                </div>
                <div class="personal-statement-media">
                    <!-- Dynamically filled -->
                </div>
            </section>
        </div>

        <!-- Right Column -->
        <div class="right-column">
            <section class="projects">
                <h2>Independent Team Projects (2022-Present)</h2>
                <div id="projects">
                    <!-- Dynamically filled -->
                </div>
            </section>

            <section class="experience">
                <div id="professional-experience">
                    <!-- Dynamically filled -->
                </div>
            </section>
        </div>
    </div>
    <script src="/en_resume/js/main.js"></script>
</body>
</html>
